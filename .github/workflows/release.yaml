name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip GitHub Release upload'
        required: false
        default: 'true'
        type: boolean

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─── Vendor llama-server for every target ───────────────────────────
  vendor:
    uses: ./.github/workflows/build-llama.yml
    secrets: inherit
    permissions:
      contents: read
      packages: write

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: vendor
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Full-stack tarballs: runed + rundemo + llama-server.
          # (Windows support is dropped for now — no Windows target here.)
          - { runner: macos-14,         goos: darwin, goarch: arm64 }
          - { runner: ubuntu-22.04,     goos: linux,  goarch: amd64 }
          - { runner: ubuntu-22.04-arm, goos: linux,  goarch: arm64 }

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION=$(git describe --tags --always 2>/dev/null || echo dev)
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      # ─── Vendor artifact ────────────────────────────────────────────
      - name: Download llama-server
        uses: actions/download-artifact@v4
        with:
          name: llama-server-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/

      - name: Ensure llama-server executable
        shell: bash
        run: chmod +x bin/llama-server

      # Build OS label (ubuntu-2204 / mac-14) for the release asset name, read
      # from the running image so it reflects the actual build baseline/glibc.
      - name: Resolve build OS label
        id: osinfo
        shell: bash
        run: |
          set -euo pipefail
          case "${RUNNER_OS}" in
            Linux)
              . /etc/os-release
              echo "label=${ID}-${VERSION_ID//./}" >> "$GITHUB_OUTPUT"          # ubuntu-2204
              ;;
            macOS)
              echo "label=mac-$(sw_vers -productVersion | cut -d. -f1)" >> "$GITHUB_OUTPUT"  # mac-14
              ;;
            *)
              echo "::error::unhandled RUNNER_OS=${RUNNER_OS}" >&2; exit 1 ;;
          esac

      # ─── Smoke gate before packaging ────────────────────────────────
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read embedding model pin
        id: model
        shell: bash
        run: |
          echo "sha256=$(awk '/^sha256:/ {print $2}' .embedding-model.yaml)" >> "$GITHUB_OUTPUT"
          echo "url=$(awk '/^url:/ {print $2}' .embedding-model.yaml)"       >> "$GITHUB_OUTPUT"
          echo "file=$(awk '/^file:/ {print $2}' .embedding-model.yaml)"     >> "$GITHUB_OUTPUT"

      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: models
          key: embedding-model-${{ steps.model.outputs.sha256 }}

      - name: Fetch embedding model (cache miss only)
        shell: bash
        env:
          FILE: ${{ steps.model.outputs.file }}
          URL:  ${{ steps.model.outputs.url }}
          SHA:  ${{ steps.model.outputs.sha256 }}
        run: |
          set -euo pipefail
          mkdir -p models
          if [ ! -f "models/${FILE}" ]; then
            curl -L --fail -o "models/${FILE}" "${URL}"
          fi
          echo "${SHA}  models/${FILE}" | shasum -a 256 -c -

      - name: Run integration tests (release gate)
        env:
          RUNED_TEST_LLAMA_SERVER: ${{ github.workspace }}/bin/llama-server
          RUNED_TEST_GGUF:         ${{ github.workspace }}/models/${{ steps.model.outputs.file }}
        run: go test -race -v ./internal/backend ./internal/server -run 'EmbedReturns|ReturnsVector'

      # ─── Build runed + package tarball ──────────────────────────────
      - name: Build runed binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ steps.meta.outputs.version }}
          DEFAULT_MANIFEST_URL: https://github.com/${{ github.repository }}/releases/download/${{ steps.meta.outputs.version }}/manifest.json
        run: make build

      - name: Package tarball
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          OS_LABEL: ${{ steps.osinfo.outputs.label }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: make release-tarball

      - name: Verify license files in release tarball
        shell: bash
        run: |
          set -euo pipefail
          archive=$(find dist -maxdepth 1 -name '*.tar.gz' -print -quit)
          test -n "${archive}"
          tar -tzf "${archive}" > "${archive}.contents"
          for path in \
            LICENSE \
            NOTICE \
            THIRD_PARTY_LICENSES/README.md \
            THIRD_PARTY_LICENSES/llama.cpp.LICENSE \
            THIRD_PARTY_LICENSES/Qwen3-Embedding.Apache-2.0.LICENSE
          do
            grep -Fxq "${path}" "${archive}.contents"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
          retention-days: 7

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || inputs.dry_run == 'false'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: release-*
          merge-multiple: true

      - name: Resolve version
        id: meta
        run: echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Generate manifest
        working-directory: dist/
        shell: bash
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail

          MODEL_FILE=$(awk '/^file:/   {print $2}' "${GITHUB_WORKSPACE}/.embedding-model.yaml")
          MODEL_SHA=$(awk  '/^sha256:/ {print $2}' "${GITHUB_WORKSPACE}/.embedding-model.yaml")
          MODEL_URL=$(awk  '/^url:/    {print $2}' "${GITHUB_WORKSPACE}/.embedding-model.yaml")
          MODEL_VARIANT=$(printf %s "${MODEL_FILE}" | sed 's/\.gguf$//' | tr '[:upper:]' '[:lower:]')

          cat > manifest.json <<EOF
          {
            "version": 1,
            "models": {
              "${MODEL_VARIANT}": {
                "url":    "${MODEL_URL}",
                "sha256": "${MODEL_SHA}"
              }
            },
            "default_model": "${MODEL_VARIANT}"
          }
          EOF

          # Validate JSON
          jq . manifest.json > /dev/null
          cat manifest.json

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          name: ${{ steps.meta.outputs.version }}
          prerelease: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/manifest.json
            dist/*.tar.gz
            dist/*.sha256
