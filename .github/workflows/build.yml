name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: macos-14,         goos: darwin, goarch: arm64, smoke: false }
          - { runner: ubuntu-latest,    goos: linux,  goarch: amd64, smoke: true  }
          - { runner: ubuntu-24.04-arm, goos: linux,  goarch: arm64, smoke: true  }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true
      - uses: bufbuild/buf-setup-action@v1
      - name: Generate proto
        run: buf generate
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race ./...
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: make build

      # End-to-end smoke test gating each PR. Runs on linux/amd64 only —
      # the heavy bits (llama.cpp build + GGUF) are GHA-cached, so once
      # main has populated the cache subsequent PRs hit ~1-2 minutes.
      - name: Smoke test (PR gate)
        if: matrix.smoke
        uses: ./.github/actions/smoke-llama-server
