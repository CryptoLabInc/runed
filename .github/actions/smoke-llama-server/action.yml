name: Smoke test runed via llama-server
description: |
  Pull the pinned llama-server binary from GHCR, fetch the pinned
  embedding model (GHA-cached), and run the Go integration tests that
  exercise the full spawn → embed → vector path.

  llama-server source: GHCR only (ghcr.io/${repo}/llama-server:
  <ref>-<os>-<arch>). The build-llama workflow is responsible for
  publishing it; missing tags fail this step deliberately rather than
  silently rebuilding — keeping smoke runs predictable in cost (~5s
  per matrix entry).

  embedding model: actions/cache (keyed by sha256) → curl fetch on
  miss. Not vendored to GHCR — passthrough HF download, no build
  artifact to mirror.

  Unix-only (uses oras, curl, shasum). Windows callers handle their
  own llama-server.exe.

  Pins consumed:
    .llama-cpp-version    — llama.cpp ref
    .embedding-model.yaml — model url + sha256

runs:
  using: composite
  steps:
    - name: Read pinned llama.cpp ref
      id: llama
      shell: bash
      run: echo "ref=$(cat .llama-cpp-version)" >> "$GITHUB_OUTPUT"

    - name: Read pinned embedding model
      id: model
      shell: bash
      run: |
        sha256=$(awk '/^sha256:/ {print $2}' .embedding-model.yaml)
        url=$(awk '/^url:/ {print $2}' .embedding-model.yaml)
        file=$(awk '/^file:/ {print $2}' .embedding-model.yaml)
        echo "sha256=${sha256}" >> "$GITHUB_OUTPUT"
        echo "url=${url}"       >> "$GITHUB_OUTPUT"
        echo "file=${file}"     >> "$GITHUB_OUTPUT"

    - name: Normalize OS/arch for OCI tags
      id: plat
      shell: bash
      run: |
        os=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
        case "${{ runner.arch }}" in
          X64)   arch=amd64 ;;
          ARM64) arch=arm64 ;;
          *)     arch=$(echo "${{ runner.arch }}" | tr '[:upper:]' '[:lower:]') ;;
        esac
        echo "os=${os}"     >> "$GITHUB_OUTPUT"
        echo "arch=${arch}" >> "$GITHUB_OUTPUT"

    # ─── llama-server: GHCR pull (no fallback) ──────────────────────────
    - name: Install oras
      uses: oras-project/setup-oras@v1

    - name: Login to GHCR
      shell: bash
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "$GH_TOKEN" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin

    - name: Pull llama-server from GHCR
      shell: bash
      env:
        REPO: ${{ github.repository }}
        REF:  ${{ steps.llama.outputs.ref }}
        OS:   ${{ steps.plat.outputs.os }}
        ARCH: ${{ steps.plat.outputs.arch }}
      run: |
        set -euo pipefail
        mkdir -p bin
        ref_repo=$(echo "${REPO}" | tr '[:upper:]' '[:lower:]')
        ref="ghcr.io/${ref_repo}/llama-server:${REF}-${OS}-${ARCH}"
        echo "Pulling ${ref}"
        oras pull --output bin "${ref}"
        chmod +x bin/llama-server
        bin/llama-server --version

    # ─── embedding model: cache + curl fetch ────────────────────────────
    - name: Cache embedding model
      uses: actions/cache@v4
      with:
        path: models
        key: embedding-model-${{ steps.model.outputs.sha256 }}

    - name: Fetch embedding model (cache miss only)
      shell: bash
      env:
        FILE: ${{ steps.model.outputs.file }}
        URL:  ${{ steps.model.outputs.url }}
        SHA:  ${{ steps.model.outputs.sha256 }}
      run: |
        set -euo pipefail
        mkdir -p models
        if [ ! -f "models/${FILE}" ]; then
          curl -L --fail -o "models/${FILE}" "${URL}"
        fi
        echo "${SHA}  models/${FILE}" | shasum -a 256 -c -

    - name: Run integration tests
      shell: bash
      env:
        RUNED_TEST_LLAMA_SERVER: ${{ github.workspace }}/bin/llama-server
        RUNED_TEST_GGUF:         ${{ github.workspace }}/models/${{ steps.model.outputs.file }}
      run: go test -race -v ./internal/backend ./internal/server -run 'EmbedReturns|ReturnsVector'
