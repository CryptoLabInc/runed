name: Smoke test runed via llama-server
description: |
  Prepare llama-server + pinned embedding model, then run the Go
  integration tests that exercise the full spawn → embed → vector path.

  Source preference order:
    llama-server:
      1. GHCR (ghcr.io/${repo}/llama-server:<ref>-<os>-<arch>) — published
         by the build-llama workflow; effectively permanent, ~5s pull.
      2. actions/cache hit — populated by a previous run; 7-day eviction.
      3. Local build (make llama-server) — slowest, ~5-20min on first run.
    embedding model:
      1. actions/cache hit (keyed by sha256).
      2. Direct curl from .embedding-model.yaml's URL.
      (Not vendored to GHCR — passthrough fetch, no build value to mirror.)

  Until build-llama is fully wired up the GHCR pull always misses and the
  composite falls through to (2) / (3); behavior is unchanged from before
  this change, but the workflow file is already structured for the
  permanent-cache path so PR-vendor only needs to flip a switch.

  Unix-only (uses make, curl, oras). Skip from Windows callers.

  Pins consumed:
    .llama-cpp-version    — llama.cpp ref
    .embedding-model.yaml — model url + sha256

runs:
  using: composite
  steps:
    - name: Read pinned llama.cpp ref
      id: llama
      shell: bash
      run: echo "ref=$(cat .llama-cpp-version)" >> "$GITHUB_OUTPUT"

    - name: Read pinned embedding model
      id: model
      shell: bash
      run: |
        sha256=$(awk '/^sha256:/ {print $2}' .embedding-model.yaml)
        url=$(awk '/^url:/ {print $2}' .embedding-model.yaml)
        file=$(awk '/^file:/ {print $2}' .embedding-model.yaml)
        echo "sha256=${sha256}" >> "$GITHUB_OUTPUT"
        echo "url=${url}"       >> "$GITHUB_OUTPUT"
        echo "file=${file}"     >> "$GITHUB_OUTPUT"

    - name: Normalize OS/arch for OCI tags
      id: plat
      shell: bash
      run: |
        os=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
        case "${{ runner.arch }}" in
          X64)   arch=amd64 ;;
          ARM64) arch=arm64 ;;
          *)     arch=$(echo "${{ runner.arch }}" | tr '[:upper:]' '[:lower:]') ;;
        esac
        echo "os=${os}"     >> "$GITHUB_OUTPUT"
        echo "arch=${arch}" >> "$GITHUB_OUTPUT"

    # ─── Tier 1: GHCR (effectively permanent) ─────────────────────────────
    - name: Install oras
      uses: oras-project/setup-oras@v1

    - name: Try GHCR pull (llama-server)
      id: ghcr_llama
      continue-on-error: true
      shell: bash
      env:
        REPO: ${{ github.repository }}
        REF:  ${{ steps.llama.outputs.ref }}
        OS:   ${{ steps.plat.outputs.os }}
        ARCH: ${{ steps.plat.outputs.arch }}
      run: |
        set -euo pipefail
        mkdir -p bin
        # Lowercase repo name (ghcr.io requires it).
        ref_repo=$(echo "${REPO}" | tr '[:upper:]' '[:lower:]')
        ref="ghcr.io/${ref_repo}/llama-server:${REF}-${OS}-${ARCH}"
        echo "Trying GHCR pull: ${ref}"
        oras pull --output bin "${ref}"
        chmod +x bin/llama-server
        bin/llama-server --version

    # ─── Tier 2: GHA cache + Tier 3: local build / direct fetch ───────────
    - name: Cache llama.cpp source + build
      if: steps.ghcr_llama.outcome == 'failure'
      uses: actions/cache@v4
      with:
        path: third_party/llama.cpp
        key: llamacpp-${{ steps.llama.outputs.ref }}-${{ runner.os }}-${{ runner.arch }}

    - name: Cache embedding model
      uses: actions/cache@v4
      with:
        path: models
        key: embedding-model-${{ steps.model.outputs.sha256 }}

    - name: Build llama-server (fallback)
      if: steps.ghcr_llama.outcome == 'failure'
      shell: bash
      run: make llama-server

    - name: Fetch embedding model (cache miss only)
      shell: bash
      env:
        FILE: ${{ steps.model.outputs.file }}
        URL:  ${{ steps.model.outputs.url }}
        SHA:  ${{ steps.model.outputs.sha256 }}
      run: |
        set -euo pipefail
        mkdir -p models
        if [ ! -f "models/${FILE}" ]; then
          curl -L --fail -o "models/${FILE}" "${URL}"
        fi
        echo "${SHA}  models/${FILE}" | shasum -a 256 -c -

    - name: Run integration tests
      shell: bash
      env:
        RUNED_TEST_LLAMA_SERVER: ${{ github.workspace }}/bin/llama-server
        RUNED_TEST_GGUF:         ${{ github.workspace }}/models/${{ steps.model.outputs.file }}
      run: go test -race -v ./internal/backend ./internal/server -run 'EmbedReturns|ReturnsVector'
